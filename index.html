  <div id="root"></div>
</body>
<script type="module">
  const { createApp, defineComponent } = Vue;
  const { createMemoryHistory, createRouter } = VueRouter;

  import { helper } from './static/utils.js';

  import Game from "./static/pages/Game.js";
  import SelectGame from "./static/pages/SelectGame.js";

  const routes = [
    { path: '/', component: Game },
    { path: '/select-game', component: SelectGame },
    { path: '/:pathMatch(.*)*', component: Game }
  ]

  const router = createRouter({
    history: createMemoryHistory(),
    routes,
  });

  const App = defineComponent({
    template: `
<div id="root">
  <KeepAlive>
    <RouterView />
  </KeepAlive>
</div>`
  });

  window.$app = createApp(App);
  window.$app.use(router);
  window.$app.mount('#root');
</script>

</html>
